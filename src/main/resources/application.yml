spring:
  application:
    name: wikipulse-worker
  threads:
    virtual:
      enabled: true
  datasource:
    # K8s ConfigMap/Secret bridge: postgres:5432, db=wikipulsedb, user=wikipulse
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/wikipulsedb}
    username: ${SPRING_DATASOURCE_USERNAME:wikipulse}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:wikipulse_password}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      # K8s Redis service mapping: redis:6379 (AOF disabled in infrastructure)
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        compression.type: gzip
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: wikipulse-worker-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.wikipulse.producer.domain.WikiEditEvent
        spring.json.trusted.packages: "*"
    listener:
      ack-mode: manual-immediate
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

wikipulse:
  smoke-test:
    enabled: ${WIKIPULSE_SMOKE_TEST_ENABLED:false}
  clickhouse:
    # Local IDE fallback: set WIKIPULSE_CLICKHOUSE_URL=jdbc:clickhouse://localhost:8123/default
    url: ${WIKIPULSE_CLICKHOUSE_URL:jdbc:clickhouse://clickhouse:8123/default}
    username: ${WIKIPULSE_CLICKHOUSE_USERNAME:default}
    password: ${WIKIPULSE_CLICKHOUSE_PASSWORD:}
