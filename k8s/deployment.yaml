apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikipulse-worker
  annotations:
    # ADR-020: Base Kubernetes orchestration topology (3 replicas, 1-per-partition baseline).
    # ADR-022: HPA (k8s/hpa.yaml) owns replica count at runtime (range: 1–5).
    #          The static `replicas: 3` below acts as a safe fallback only if HPA is removed.
    #          During normal operation, the HPA controller overrides this value.
    scaling.policy: "hpa-managed"
    scaling.adr: "ADR-022"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wikipulse-worker
  template:
    metadata:
      labels:
        app: wikipulse-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ingestor
          image: wikipulse-ingestor:latest
          imagePullPolicy: Never
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 120
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: wikipulse-config
            - secretRef:
                name: wikipulse-secret
