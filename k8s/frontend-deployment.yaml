apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikipulse-frontend
  labels:
    app: wikipulse-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikipulse-frontend
  template:
    metadata:
      labels:
        app: wikipulse-frontend
    spec:
      containers:
        - name: frontend
          image: wikipulse-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"

---
apiVersion: v1
kind: Service
metadata:
  name: wikipulse-frontend
  labels:
    app: wikipulse-frontend
spec:
  type: NodePort
  selector:
    app: wikipulse-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080